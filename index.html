<!DOCTYPE html>
<html>
<head>
  <title>My Stylish Page</title>

  <style>
    body {
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .card {
      background-color: white;
      width: 80%;
      margin: 50px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 0px 10px gray;
    }

    img {
      width: 120px;
      border-radius: 50%;
    }

    h1 {
      color: #333;
    }

    p {
      color: gray;
      font-size: 18px;
    }

    button {
      background-color: #ff4b2b;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
    }
  </style>

</head>

<body>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="profile">

    <h1>Anshika</h1>

    <p>BSc CS Student</p>
    <p>Future Web Developer 🚀</p>

    <button>Follow Me</button>
  </div>

</body><img src="https://i.pravatar.cc/120" alt="profile">
</html>
